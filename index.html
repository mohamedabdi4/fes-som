<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fes-Pro | Decision Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <header>
            <h1>Fes-Pro</h1>
            <p>Ma hubtaa go'aankaaga? Aan ku caawiyo!</p>
        </header>

        <main>
            <div class="input-group">
                <input type="text" id="optionInput" placeholder="Ku qor ikhtiyaarkaaga halkan...">
                <button id="addBtn" onclick="addOption()">Ku dar</button>
            </div>

            <ul id="optionList"></ul>

            <button id="decideBtn" onclick="makeDecision()">Go'aan Qaado</button>
            
            <div id="result"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
